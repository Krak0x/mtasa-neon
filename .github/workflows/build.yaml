name: Build

# Trigger the workflow on any pull request, push or manual dispatch
on: [pull_request, push, workflow_dispatch]

jobs:
  windows:
    strategy:
      matrix:
        platform: [win32, x64, arm64]
    name: windows-${{ matrix.platform }}
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v6

      # Public player builds must use MTA's anti-cheat and service checks. The
      # checked-in default remains CUSTOM so a local clone can run without an
      # installer-created HKLM registry layout.
      - name: Configure public Neon build
        shell: powershell
        run: |
          @'
          #pragma once

          #undef MTASA_VERSION_TYPE
          #define MTASA_VERSION_TYPE VERSION_TYPE_UNSTABLE
          '@ | Set-Content -LiteralPath 'Shared\build_overrides.h' -Encoding ascii

      - uses: actions/cache@v5
        id: cache-dxfiles
        with:
          path: utils/DXFiles
          key: dxfiles-0001

      - name: Download DirectX
        if: steps.cache-dxfiles.outputs.cache-hit != 'true'
        run: Invoke-WebRequest https://mirror-cdn.multitheftauto.com/bdata/DXFiles.zip -OutFile utils/DXFiles.zip
        shell: powershell

      - name: Extract DirectX
        if: steps.cache-dxfiles.outputs.cache-hit != 'true'
        run: Expand-Archive -Path utils/DXFiles.zip -DestinationPath utils/DXFiles
        shell: powershell

      - name: Install CEF
        run: utils\premake5 install_cef

      - name: Install data files
        run: utils\premake5 install_data

      - name: Run Build
        run: win-build.bat nightly ${{ matrix.platform }}
        shell: cmd
        env:
          DXSDK_DIR: './utils/DXFiles/'
          CI: 'true'

      - name: Create build artifacts
        run: utils\premake5 compose_files

      - name: Install NSIS
        if: matrix.platform == 'win32'
        run: choco install nsis --version=3.12.0 --yes --no-progress
        shell: powershell

      - name: Build and inspect Neon client installer
        if: matrix.platform == 'win32'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $filesRoot = (Resolve-Path 'InstallFiles').Path
          $installerRoot = (Resolve-Path 'Shared\installer').Path
          $outputDirectory = Join-Path $PWD 'InstallerOutput'
          $outputPath = Join-Path $outputDirectory 'MTA-Neon-Setup.exe'

          $requiredInputs = @(
            'Multi Theft Auto.exe',
            'MTA\core.dll',
            'MTA\netc.dll',
            'MTA\bootstrap.exe',
            'MTA\bootstrapc.exe',
            'MTA\sa.dat',
            'MTA\cgui\unifont.ttf',
            'mods\deathmatch\client.dll',
            'mods\deathmatch\lua5.1c.dll',
            'mods\deathmatch\pcre2.dll',
            'skins\Default\CGUI.xml'
          )
          foreach ($relativePath in $requiredInputs) {
            $inputPath = Join-Path $filesRoot $relativePath
            if (-not (Test-Path -LiteralPath $inputPath -PathType Leaf)) {
              throw "Installer input is missing: $relativePath"
            }
          }

          New-Item -ItemType Directory -Force -Path $outputDirectory | Out-Null
          $makensis = Join-Path ${env:ProgramFiles(x86)} 'NSIS\makensis.exe'
          if (-not (Test-Path -LiteralPath $makensis -PathType Leaf)) {
            throw "makensis.exe was not found at $makensis"
          }

          Push-Location $installerRoot
          try {
            & $makensis `
              '/DMTA_NEON' `
              '/DCLIENT_ONLY' `
              "/DFILES_ROOT=$filesRoot" `
              "/DINSTALL_OUTPUT=$outputPath" `
              "/DPRODUCT_VERSION=v1.7.0-neon-$env:GITHUB_RUN_NUMBER" `
              "/DREVISION=$env:GITHUB_RUN_NUMBER" `
              'nightly.nsi'
            if ($LASTEXITCODE -ne 0) {
              throw "makensis.exe failed with exit code $LASTEXITCODE"
            }
          }
          finally {
            Pop-Location
          }

          if (-not (Test-Path -LiteralPath $outputPath -PathType Leaf)) {
            throw 'NSIS did not produce MTA-Neon-Setup.exe'
          }

          & 7z t $outputPath
          if ($LASTEXITCODE -ne 0) {
            throw "7-Zip could not validate the installer (exit code $LASTEXITCODE)"
          }

          $archiveListing = @(& 7z l -slt $outputPath | ForEach-Object { $_ -replace '\\', '/' })
          if ($LASTEXITCODE -ne 0) {
            throw "7-Zip could not inspect the installer (exit code $LASTEXITCODE)"
          }
          $requiredInstallerContents = @(
            'Path = Multi Theft Auto.exe',
            'Path = MTA/core.dll',
            'Path = MTA/netc.dll',
            'Path = MTA/bootstrap.exe',
            'Path = MTA/bootstrapc.exe',
            'Path = MTA/sa.dat',
            'Path = MTA/cgui/unifont.ttf',
            'Path = mods/deathmatch/client.dll',
            'Path = mods/deathmatch/lua5.1c.dll',
            'Path = mods/deathmatch/pcre2.dll',
            'Path = skins/Default/CGUI.xml'
          )
          foreach ($expectedEntry in $requiredInstallerContents) {
            if ($archiveListing -notcontains $expectedEntry) {
              throw "Built installer is missing: $expectedEntry"
            }
          }

          $installer = Get-Item -LiteralPath $outputPath
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $outputPath
          Write-Host "Installer: $($installer.FullName)"
          Write-Host "Size: $($installer.Length) bytes"
          Write-Host "SHA-256: $($hash.Hash)"

      - uses: actions/upload-artifact@v6
        with:
          name: InstallFiles-${{ matrix.platform }}
          path: InstallFiles/
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'win32'
        with:
          name: MTA-Neon-Windows-Installer
          path: InstallerOutput/MTA-Neon-Setup.exe
          if-no-files-found: error

  macOS:
    name: macOS
    runs-on: macOS-15
    steps:
      - uses: actions/checkout@v6

      - name: Install MySQL
        run: brew install mysql
        continue-on-error: true

      - name: Link MySQL
        run: brew link --overwrite mysql

      - name: Run Build
        run: ./linux-build.sh

  linux:
    strategy:
      matrix:
        include:
          - architecture: x64
            launcher: mta-server64
          - architecture: arm64
            launcher: mta-server-arm64
    name: linux-${{ matrix.architecture }}
    runs-on: ubuntu-latest
    container:
      image: docker://ghcr.io/multitheftauto/mtasa-blue-build:latest
    steps:
      - uses: actions/checkout@v6

      # Keep local clones CUSTOM, but enable the MTA network/service behavior
      # required by the Neon server distributed to players.
      - name: Configure public Neon server build
        run: |
          printf '%s\n' \
            '#pragma once' \
            '' \
            '#undef MTASA_VERSION_TYPE' \
            '#define MTASA_VERSION_TYPE VERSION_TYPE_UNSTABLE' \
            > Shared/build_overrides.h

      - name: Run Build
        run: /docker-entrypoint.sh --arch=${{ matrix.architecture }}

      - name: Install server data and resources
        run: |
          utils/premake5 install_data
          utils/premake5 install_resources

      - name: Package Neon Linux server
        run: |
          set -eu

          package="MTA-Neon-Linux-Server-${{ matrix.architecture }}"
          mkdir -p "$package"

          cp -a "Bin/server/${{ matrix.launcher }}" "$package/"
          cp -a "Bin/server/${{ matrix.architecture }}" "$package/${{ matrix.architecture }}"
          cp -a "Bin/server/mods" "$package/mods"
          cp -a Server/output/LICENSE Server/output/NOTICE Server/output/README "$package/"

          required_files="
          $package/${{ matrix.launcher }}
          $package/${{ matrix.architecture }}/core.so
          $package/${{ matrix.architecture }}/deathmatch.so
          $package/${{ matrix.architecture }}/xmll.so
          $package/${{ matrix.architecture }}/dbconmy.so
          $package/${{ matrix.architecture }}/net.so
          $package/mods/deathmatch/mtaserver.conf
          $package/mods/deathmatch/acl.xml
          "
          for required_file in $required_files; do
            if [ ! -f "$required_file" ]; then
              echo "Linux server package is missing: $required_file" >&2
              exit 1
            fi
          done

          case "${{ matrix.architecture }}" in
            x64) expected_machine="Advanced Micro Devices X86-64" ;;
            arm64) expected_machine="AArch64" ;;
          esac
          elf_files="
          $package/${{ matrix.launcher }}
          $package/${{ matrix.architecture }}/core.so
          $package/${{ matrix.architecture }}/deathmatch.so
          $package/${{ matrix.architecture }}/xmll.so
          $package/${{ matrix.architecture }}/dbconmy.so
          $package/${{ matrix.architecture }}/net.so
          "
          for elf_file in $elf_files; do
            if ! readelf -h "$elf_file" | grep -F "Machine:" | grep -Fq "$expected_machine"; then
              echo "Linux server package has the wrong architecture: $elf_file" >&2
              exit 1
            fi
          done

          if [ ! -d "$package/mods/deathmatch/resources" ]; then
            echo "Linux server package is missing its resources directory" >&2
            exit 1
          fi

          chmod +x "$package/${{ matrix.launcher }}"
          tar -czf "$package.tar.gz" -C "$package" .
          tar -tzf "$package.tar.gz"
          sha256sum "$package.tar.gz"

      - uses: actions/upload-artifact@v6
        with:
          name: MTA-Neon-Linux-Server-${{ matrix.architecture }}
          path: MTA-Neon-Linux-Server-${{ matrix.architecture }}.tar.gz
          if-no-files-found: error
